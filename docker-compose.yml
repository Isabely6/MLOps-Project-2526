# Compose file for the COVID mortality-severity serving API (Member 4).
#   docker compose up --build
#   curl http://localhost:8000/health
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: covid-mortality-mlops:latest
    container_name: covid-mortality-api
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Optional: a local MLflow tracking UI for inspecting experiment runs.
  # Uncomment and run `docker compose up mlflow` after `pip install mlflow`.
  # mlflow:
  #   image: ghcr.io/mlflow/mlflow:v2.16.2
  #   command: mlflow server --host 0.0.0.0 --port 8080 --backend-store-uri /mlruns
  #   ports:
  #     - "8080:8080"
  #   volumes:
  #     - ./mlruns:/mlruns
