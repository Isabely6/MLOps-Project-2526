  mortality_severity: "Categorical severity target (Low/Medium/High)"

feature_metadata_path: conf/base/feature_metadata.yml


# ---------------------------------------------------------------------------
# Member 4 — Deployment & Monitoring
# ---------------------------------------------------------------------------

# Serving model: a self-contained sklearn Pipeline (median imputer + RandomForest)
# trained on the curated 6-feature feature_store contract.
serving:
  feature_columns:
    - Population
    - GDP_per_capita
    - Life_expectancy
    - Health_expenditure
    - Internet_usage
    - CO2_emissions
  target_column: mortality_severity
  label_order: [Low, Medium, High]
  random_state: 42
  test_size: 0.2
  cv_folds: 5
  model_version: "1.0.0"
  mlflow_experiment: covid_mortality_serving
  model:
    n_estimators: 300
    max_depth: null
    min_samples_leaf: 1
    class_weight: balanced
  feature_descriptions:
    Population: "Total population (persons)"
    GDP_per_capita: "GDP per capita (current US$)"
    Life_expectancy: "Average life expectancy at birth (years)"
    Health_expenditure: "Total health expenditure (% of GDP)"
    Internet_usage: "Individuals using the internet (per 100 inhabitants)"
    CO2_emissions: "CO2 emissions per capita (tons)"

# Data-drift monitoring thresholds + deterministic drift simulation.
drift:
  features:
    - Population
    - GDP_per_capita
    - Life_expectancy
    - Health_expenditure
    - Internet_usage
    - CO2_emissions
  psi_bins: 10
  js_bins: 20
  epsilon: 1.0e-6
  psi_warning: 0.10
  psi_critical: 0.20
  ks_pvalue_threshold: 0.05
  random_state: 42
  simulation:
    gdp_per_capita_shift_pct: 0.30   # +30% multiplicative shift
    health_expenditure_shift: 2.0    # +2 percentage points
    life_expectancy_shift: -3.0      # -3 years (a plausible adverse shift)
    missing_feature: Internet_usage
    missing_rate: 0.10               # inject 10% missingness
  reference_features_path: data/07_model_output/reference_features.parquet
  current_features_path: data/07_model_output/current_features.parquet
  drift_report_html_path: data/08_reporting/drift_report.html


