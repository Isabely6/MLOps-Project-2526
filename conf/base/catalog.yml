# Serving artifacts (self-contained inference Pipeline + JSON contract).
serving_model:
  type: pickle.PickleDataSet
  filepath: data/06_models/serving_model.pkl

serving_bundle:
  type: kedro.extras.datasets.json.JSONDataSet
  filepath: data/06_models/serving_bundle.json
  save_args:
    ensure_ascii: false
    indent: 2

serving_metrics:
