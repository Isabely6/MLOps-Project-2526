  filepath: data/06_models/trained_models.pkl

model_metrics:
  type: pandas.CSVDataSet
  filepath: data/05_reports/model_metrics.csv

feature_importance:
  type: pandas.CSVDataSet
  filepath: data/05_reports/feature_importance.csv

best_model_metrics:
